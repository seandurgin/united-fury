<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cecil FC | United & Fury</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
</head>
<body>

  <div class="container">

    <!-- LEFT: UNITED -->
    <a class="side united" href="united/index.html">
      <div class="side-content">
        <picture>
          <source srcset="assets/img/united.webp" type="image/webp">
          <img class="crest-img" src="assets/img/united.png" alt="Cecil FC United">
        </picture>
        <h1 class="team-name">UNITED</h1>
        <p class="team-sub">2013 Boys · Cecil FC</p>
        <span class="enter-btn">Enter →</span>
      </div>
    </a>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="divider-line divider-line-top"></div>
      <div class="soccer-ball">⚽</div>
      <div class="divider-line"></div>
    </div>

    <!-- RIGHT: FURY -->
    <a class="side fury" href="fury/index.html">
      <div class="side-content">
        <picture>
          <source srcset="assets/img/fury.webp" type="image/webp">
          <img class="crest-img" src="assets/img/fury.png" alt="Cecil FC Fury">
        </picture>
        <h1 class="team-name">FURY</h1>
        <p class="team-sub">2015 Boys · Cecil FC</p>
        <span class="enter-btn">Enter →</span>
      </div>
    </a>

  </div>

  <p class="footer">Cecil FC · Cecil County, MD</p>

</body>
</html>
