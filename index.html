<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cecil FC | United & Fury</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="split-container">

    <!-- LEFT: UNITED -->
    <div class="panel panel-united" id="panel-united">
      <div class="panel-content">
        <picture>
          <source srcset="assets/img/united.webp" type="image/webp">
          <img src="assets/img/united.png" alt="Cecil FC United" width="240">
        </picture>
        <h1 class="team-name united-text">UNITED</h1>
        <p class="team-sub">2013 Boys · Cecil FC</p>
        <a href="united/index.html" class="enter-btn united-btn">Enter →</a>
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="soccer-ball">⚽</div>
    </div>

    <!-- RIGHT: FURY -->
    <div class="panel panel-fury" id="panel-fury">
      <div class="panel-content">
        <picture>
          <source srcset="assets/img/fury.webp" type="image/webp">
          <img src="assets/img/fury.png" alt="Cecil FC Fury" width="240">
        </picture>
        <h1 class="team-name fury-text">FURY</h1>
        <p class="team-sub">2015 Boys · Cecil FC</p>
        <a href="fury/index.html" class="enter-btn fury-btn">Enter →</a>
      </div>
    </div>

  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
