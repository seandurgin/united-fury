<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cecil FC United & Fury | Travel Soccer</title>
  <meta name="description" content="Cecil FC United and Cecil FC Fury — 2013 & 2015 Boys Travel Soccer, Cecil County Maryland">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/fury.png">
  <link rel="apple-touch-icon" href="/assets/img/fury.png">
</head>
<body>

  <div class="split-container">

    <!-- LEFT: UNITED -->
    <div class="side united" id="united-side">
      <a href="#united" class="side-link" aria-label="Enter United">
        <div class="side-content">
          <picture>
            <source srcset="/assets/img/united.webp" type="image/webp">
            <img src="/assets/img/united.png" alt="Cecil FC United" width="240" class="crest">
          </picture>
          <h1 class="team-name">UNITED</h1>
          <p class="team-sub">2013 Boys · Cecil FC</p>
          <span class="enter-btn">Enter ⚽</span>
        </div>
      </a>
    </div>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="divider-ball">⚽</div>
    </div>

    <!-- RIGHT: FURY -->
    <div class="side fury" id="fury-side">
      <a href="#fury" class="side-link" aria-label="Enter Fury">
        <div class="side-content">
          <picture>
            <source srcset="/assets/img/fury.webp" type="image/webp">
            <img src="/assets/img/fury.png" alt="Cecil FC Fury" width="240" class="crest">
          </picture>
          <h1 class="team-name">FURY</h1>
          <p class="team-sub">2015 Boys · Cecil FC</p>
          <span class="enter-btn">Enter ⚽</span>
        </div>
      </a>
    </div>

  </div>

  <script src="/assets/js/main.js"></script>
</body>
</html>
