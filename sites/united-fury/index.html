<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cecil FC | United & Fury</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <a class="side united" href="/united">
    <div class="side-content">
      <img class="crest-img" src="/img/united-crest.png" alt="Cecil FC United">
      <div class="team-name">United</div>
      <div class="team-sub">Cecil FC &bull; 2013 Boys</div>
      <button class="enter-btn">Enter &rarr;</button>
    </div>
  </a>
  <div class="divider">
    <div class="divider-line divider-line-top"></div>
    <div class="soccer-ball">&#9917;</div>
    <div class="divider-line"></div>
  </div>
  <a class="side fury" href="/fury">
    <div class="side-content">
      <img class="crest-img" src="/img/fury-crest.png" alt="Cecil FC Fury">
      <div class="team-name">Fury</div>
      <div class="team-sub">Cecil FC &bull; 2015 Boys</div>
      <button class="enter-btn">Enter &rarr;</button>
    </div>
  </a>
</div>
<div class="footer">Cecil FC &bull; United &bull; Fury</div>
</body>
</html>
